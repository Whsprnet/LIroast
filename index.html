<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Roast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: #f7f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 4rem 1.5rem;
  }

  .container { width: 100%; max-width: 600px; }

  .header { margin-bottom: 3rem; }
  .logo { font-size: 11px; font-family: 'DM Mono', monospace; color: #888; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.5rem; }
  h1 { font-size: 42px; font-weight: 800; line-height: 1.05; letter-spacing: -1px; color: #1a1a1a; margin-bottom: 0.5rem; }
  .tagline { font-size: 15px; color: #666; line-height: 1.5; }

  .input-group { margin-top: 2.5rem; }
  .input-wrap { display: flex; gap: 8px; margin-bottom: 8px; }

  input[type="text"] {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: #999; }

  button.primary {
    background: #1a1a1a;
    color: #f7f5f0;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  button.primary:hover { opacity: 0.8; }
  button.primary:disabled { opacity: 0.35; cursor: default; }

  .hint { font-size: 12px; color: #aaa; font-family: 'DM Mono', monospace; }

  .loader { margin-top: 2rem; font-family: 'DM Mono', monospace; font-size: 13px; color: #888; display: none; }
  .loader.visible { display: block; }

  .result {
    margin-top: 2.5rem;
    border: 1px solid #e5e2db;
    border-radius: 12px;
    background: #fff;
    padding: 2rem;
    display: none;
  }
  .result.visible { display: block; }

  .score-block { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #eee; }
  .score-num { font-size: 56px; font-weight: 800; letter-spacing: -2px; line-height: 1; color: #1a1a1a; }
  .score-denom { font-size: 18px; color: #bbb; font-weight: 400; }
  .verdict { margin-top: 0.5rem; font-size: 17px; font-weight: 700; color: #1a1a1a; line-height: 1.4; }

  .section-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: #bbb;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 1.5rem 0 0.75rem;
  }

  .roast-item {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-style: italic;
    color: #444;
    line-height: 1.6;
    padding: 0.75rem 1rem;
    border-left: 2px solid #e0ddd6;
    margin-bottom: 0.5rem;
    background: #faf9f7;
    border-radius: 0 6px 6px 0;
  }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 4px 12px;
    border-radius: 99px;
  }
  .pill-red { background: #FCEBEB; color: #A32D2D; }
  .pill-green { background: #EAF3DE; color: #3B6D11; }

  .actions { margin-top: 2rem; display: flex; gap: 8px; flex-wrap: wrap; }
  button.secondary {
    flex: 1;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  button.secondary:hover { background: #f3f1ec; }

  .error { margin-top: 1rem; font-family: 'DM Mono', monospace; font-size: 13px; color: #A32D2D; display: none; }
  .error.visible { display: block; }

  @media (max-width: 480px) {
    h1 { font-size: 32px; }
    .input-wrap { flex-direction: column; }
    button.primary { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <p class="logo">AI-powered eerlijkheid</p>
    <h1>LinkedIn<br>Roast</h1>
    <p class="tagline">Wat je recruiter denkt maar nooit durft te zeggen.</p>
  </div>

  <div class="input-group">
    <div class="input-wrap">
      <input type="text" id="urlInput" placeholder="linkedin.com/in/jouwprofiel" />
      <button class="primary" id="roastBtn" onclick="startRoast()">Roast me &rarr;</button>
    </div>
    <p class="hint">Een naam of functietitel werkt ook gewoon.</p>
  </div>

  <div class="loader" id="loader">Profiel analyseren...</div>
  <div class="error" id="errorMsg">Er ging iets mis. Controleer je API key en probeer opnieuw.</div>

  <div class="result" id="result">
    <div class="score-block">
      <div>
        <span class="score-num" id="scoreNum">—</span>
        <span class="score-denom"> / 100</span>
      </div>
      <p class="verdict" id="verdict"></p>
    </div>

    <p class="section-label">Wat we je niet door de vingers zien</p>
    <div id="roastLines"></div>

    <p class="section-label">Rode vlaggen</p>
    <div class="pill-row" id="redFlags"></div>

    <p class="section-label">Wat wél werkt</p>
    <div class="pill-row" id="greenFlags"></div>

    <div class="actions">
      <button class="secondary" onclick="shareLinkedIn()">Deel op LinkedIn &rarr;</button>
      <button class="secondary" onclick="reset()">Nog een profiel</button>
    </div>
  </div>
</div>

<script>
const ANTHROPIC_API_KEY = 'JOUW_API_KEY_HIER';

const loaderMessages = [
  'Profiel analyseren...',
  'Buzzwords tellen...',
  'Clichés markeren...',
  'Pijnlijke waarheden formuleren...',
  'Adem halen voor je...',
  'Bijna klaar met oordelen...'
];

let loaderInterval;
let lastInput = '';
let lastParsed = null;

async function startRoast() {
  const input = document.getElementById('urlInput').value.trim();
  if (!input) { document.getElementById('urlInput').focus(); return; }
  lastInput = input;

  const btn = document.getElementById('roastBtn');
  const loader = document.getElementById('loader');
  const result = document.getElementById('result');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  result.classList.remove('visible');
  errorMsg.classList.remove('visible');
  loader.classList.add('visible');

  let i = 0;
  loaderInterval = setInterval(() => {
    loader.textContent = loaderMessages[i % loaderMessages.length];
    i++;
  }, 900);

  const prompt = `Je bent een briljante, grappige maar eerlijke LinkedIn-coach die profielen roast.
De gebruiker geeft je dit als input: "${input}"

Interpreteer dit creatief als een LinkedIn profiel. Als het een naam is, verzin een passend herkenbaar profiel. Als het een URL is, doe alsof je het hebt bekeken.

Geef ALLEEN een JSON object terug. Geen uitleg, geen markdown, geen backticks, puur JSON:
{"score":<getal 1-100>,"verdict":"<één zin, grappig maar eerlijk oordeel, max 12 woorden>","roasts":["<opmerking 1>","<opmerking 2>","<opmerking 3>"],"redFlags":["<vlag 1>","<vlag 2>","<vlag 3>"],"greenFlags":["<plus 1>","<plus 2>"]}

Wees grappig, specifiek en herkenbaar. Denk aan: "resultaatgericht teamplayer", profielfoto in auto, headline die alleen functietitel is, 500+ connecties maar 0 posts, "passionate about", etc.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) throw new Error('HTTP ' + response.status);

    const data = await response.json();
    const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('').replace(/```json|```/g, '').trim();
    lastParsed = JSON.parse(raw);

    clearInterval(loaderInterval);
    loader.classList.remove('visible');
    renderResult(lastParsed);

  } catch (err) {
    clearInterval(loaderInterval);
    loader.classList.remove('visible');
    errorMsg.classList.add('visible');
    console.error(err);
  }

  btn.disabled = false;
}

function renderResult(parsed) {
  document.getElementById('scoreNum').textContent = parsed.score;
  document.getElementById('verdict').textContent = parsed.verdict;

  const rc = document.getElementById('roastLines');
  rc.innerHTML = '';
  parsed.roasts.forEach(r => {
    const d = document.createElement('div');
    d.className = 'roast-item';
    d.textContent = r;
    rc.appendChild(d);
  });

  const rf = document.getElementById('redFlags');
  rf.innerHTML = '';
  parsed.redFlags.forEach(f => {
    const s = document.createElement('span');
    s.className = 'pill pill-red';
    s.textContent = f;
    rf.appendChild(s);
  });

  const gf = document.getElementById('greenFlags');
  gf.innerHTML = '';
  parsed.greenFlags.forEach(f => {
    const s = document.createElement('span');
    s.className = 'pill pill-green';
    s.textContent = f;
    gf.appendChild(s);
  });

  document.getElementById('result').classList.add('visible');
}

function shareLinkedIn() {
  if (!lastParsed) return;
  const text = `Ik liet mijn LinkedIn profiel roasten door AI en scoorde ${lastParsed.score}/100.\n\n"${lastParsed.verdict}"\n\nProbeer het zelf 👇`;
  const url = 'https://www.linkedin.com/sharing/share-offsite/?summary=' + encodeURIComponent(text);
  window.open(url, '_blank');
}

function reset() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('urlInput').value = '';
  document.getElementById('urlInput').focus();
}

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startRoast();
});
</script>
</body>
</html>
